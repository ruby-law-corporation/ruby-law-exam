services:
  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    env_file: .env
    ports:
      - '3001:3001'

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:?set VITE_API_URL in .env}
    depends_on:
      - api
    ports:
      - '5173:5173'
