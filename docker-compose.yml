services:
  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    env_file: .env
    environment:
      PORT: 3001
    ports:
      - '3001:3001'
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:3001/api/health']
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    environment:
      API_HOST: api
      API_PORT: 3001
    depends_on:
      api:
        condition: service_healthy
    ports:
      - '5173:8080'
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:8080/']
      interval: 5s
      timeout: 3s
      retries: 5

  banner:
    image: alpine
    depends_on:
      web:
        condition: service_healthy
    command:
      - sh
      - -c
      - |
        echo ''
        echo '  Web: http://localhost:5173'
        echo '  API: http://localhost:3001'
        echo ''
