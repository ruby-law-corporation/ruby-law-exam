# Rendered by nginx's envsubst entrypoint from web.nginx.conf.template at startup.
server {
  listen 8080;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  client_max_body_size 10m;

  # Reverse-proxy the API so the SPA stays same-origin (matches relative /api/* calls).
  location /api/ {
    proxy_pass http://${API_HOST}:${API_PORT};
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Server-Sent Events (analysis progress stream) must not be buffered.
    proxy_set_header Connection '';
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 1h;
  }

  # SPA fallback: serve index.html for client-side routes.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
